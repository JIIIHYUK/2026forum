<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>공용 페이지 | Mars Terraforming Commons</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='22' fill='%23d96f3c'/%3E%3Ccircle cx='24' cy='24' r='5' fill='%235f241b' opacity='.8'/%3E%3Ccircle cx='42' cy='38' r='7' fill='%239d3e22' opacity='.75'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./css/styles.css?v=14" />
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js"
        }
      }
    </script>
  </head>
  <body class="public-page">
    <header class="top-bar">
      <a class="brand" href="./index.html" aria-label="공용 페이지로 이동">
        <span class="brand-mark"></span>
        <span>공용 페이지</span>
      </a>
      <div class="top-actions">
        <button class="ghost-button" id="settleGrantsButton" type="button">지원 정산</button>
        <a class="ghost-link admin-entry-link" href="./admin.html">관리자</a>
      </div>
    </header>

    <main class="public-shell">
      <section class="ranking-panel" aria-labelledby="rankingTitle">
        <div class="section-kicker">Contribution</div>
        <h1 id="rankingTitle">기업 기여도 순위</h1>
        <ol class="ranking-list" id="rankingList"></ol>
      </section>

      <aside class="company-rail company-rail-left" aria-label="왼쪽 기업란">
        <div class="rail-title">기업란</div>
        <div class="company-stack" id="leftCompanies"></div>
      </aside>

      <section class="mars-stage" aria-label="화성 3D 공전 화면">
        <canvas id="marsCanvas"></canvas>
        <div class="mars-readout" aria-live="polite">
          <div>
            <span>종합 테라포밍</span>
            <strong id="globalTerraforming">0.00%</strong>
          </div>
          <div>
            <span>다음 정부 지원</span>
            <strong id="nextGrantCountdown">30:00</strong>
          </div>
        </div>
      </section>

      <aside class="company-rail company-rail-right" aria-label="오른쪽 기업란">
        <div class="rail-title">기업란</div>
        <div class="company-stack" id="rightCompanies"></div>
      </aside>
    </main>

    <section class="news-drawer" id="newsDrawer" aria-expanded="false">
      <button class="drawer-handle" id="newsHandle" type="button" aria-controls="projectFeed">
        <span class="handle-line"></span>
        <span>소식 확인란</span>
      </button>
      <div class="news-body">
        <div class="news-heading">
          <div>
            <div class="section-kicker">Project Feed</div>
            <h2>시간대별 프로젝트</h2>
          </div>
          <span id="projectCount">0개</span>
        </div>
        <div class="project-feed" id="projectFeed"></div>
      </div>
    </section>

    <script type="module" src="./js/publicPage.js?v=29"></script>
  </body>
</html>
