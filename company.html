<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기업 세부사항 | Mars Terraforming Commons</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='22' fill='%23d96f3c'/%3E%3Ccircle cx='24' cy='24' r='5' fill='%235f241b' opacity='.8'/%3E%3Ccircle cx='42' cy='38' r='7' fill='%239d3e22' opacity='.75'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./css/styles.css?v=18" />
  </head>
  <body class="detail-page">
    <header class="top-bar">
      <a class="brand" href="./index.html" aria-label="공용 페이지로 이동">
        <span class="brand-mark"></span>
        <span>공용 페이지</span>
      </a>
      <div class="top-actions">
        <a class="ghost-link admin-entry-link" href="./admin.html">관리자</a>
        <a class="ghost-link" href="./index.html">순위 보기</a>
      </div>
    </header>

    <main class="detail-shell">
      <aside class="profile-panel">
        <div class="company-logo" id="companyLogo">E</div>
        <div class="profile-copy">
          <div class="section-kicker">Company</div>
          <h1 class="company-name-stack" id="companyName">
            <span class="company-name-ko">엔시스</span>
            <span class="company-name-en">ENSYS</span>
          </h1>
          <p id="companyFeature">기업 특징</p>
        </div>

        <dl class="stat-grid">
          <div>
            <dt>보유 예산</dt>
            <dd id="companyBudget">0원</dd>
          </div>
          <div>
            <dt>총 기여도</dt>
            <dd id="companyContribution">0.00%</dd>
          </div>
          <div>
            <dt>프로젝트</dt>
            <dd id="companyProjectCount">0개</dd>
          </div>
          <div>
            <dt>추가 가능</dt>
            <dd id="companyProjectLimit">3/3회</dd>
          </div>
          <div>
            <dt>정부/홍보 획득</dt>
            <dd id="companyFunding">0원</dd>
          </div>
          <div>
            <dt>인지도</dt>
            <dd id="companyAwareness">0.00%</dd>
          </div>
        </dl>
      </aside>

      <section class="project-panel">
        <div class="panel-heading">
          <div>
            <div class="section-kicker">Project Builder</div>
            <h2>프로젝트 추가</h2>
          </div>
          <span id="saveStatus">대기</span>
        </div>

        <form class="project-form" id="projectForm">
          <label>
            <span>프로젝트명</span>
            <input id="projectName" name="projectName" type="text" placeholder="예: 극지 산소 순환 파일럿" required />
          </label>
          <label>
            <span>사용 기술</span>
            <input id="projectTech" name="projectTech" type="text" placeholder="예: 미생물 반응기, 열 차폐막, 자동 시추" required />
          </label>
          <label>
            <span>가격 예상</span>
            <input id="projectPrice" name="projectPrice" type="number" min="0" step="1000000" placeholder="숫자만 입력" required />
          </label>
          <label class="full-row">
            <span>기대효과</span>
            <textarea id="projectExpectedEffect" name="projectExpectedEffect" rows="4" placeholder="프로젝트가 달성하고자 하는 기대효과를 입력" required></textarea>
          </label>
          <label class="full-row">
            <span>신기술 실현 방식</span>
            <textarea id="projectRealizationMethod" name="projectRealizationMethod" rows="4" placeholder="신기술을 실제로 구현하는 방식을 입력" required></textarea>
          </label>
          <label class="full-row">
            <span>적용 방식</span>
            <textarea id="projectApplicationMethod" name="projectApplicationMethod" rows="4" placeholder="화성 테라포밍 목표에 적용하는 방식을 입력" required></textarea>
          </label>
          <button class="primary-button full-row" type="submit">등록</button>
        </form>

        <section class="evaluation-card" id="evaluationPanel" aria-live="polite">
          <div class="empty-state">입력값이 들어오면 AI 평가가 표시됩니다.</div>
        </section>

        <section class="decision-card is-hidden" id="decisionPanel" aria-live="polite">
          <div>
            <h3>예산 부족</h3>
            <p id="shortageMessage">예산이 부족합니다.</p>
          </div>
          <div class="decision-actions">
            <button class="ghost-button" id="abandonProjectButton" type="button">포기</button>
            <button class="primary-button" id="spendMoreButton" type="button">돈 더 쓰기</button>
          </div>
        </section>
      </section>

      <aside class="promotion-panel">
        <div class="panel-heading">
          <div>
            <div class="section-kicker">Funding</div>
            <h2>홍보</h2>
          </div>
        </div>

        <div class="funding-summary">
          <span>AI 기준 정부 지원</span>
          <strong id="governmentGrantPreview">0원</strong>
        </div>

        <button class="primary-button" id="runPromotionButton" type="button">10억 홍보 실행</button>

        <div class="age-table" id="ageFundingTable"></div>

        <div class="politics-box" id="politicsPanel"></div>

        <div class="collaboration-box" id="collaborationPanel"></div>
      </aside>

      <section class="history-panel">
        <div class="panel-heading">
          <div>
            <div class="section-kicker">History</div>
            <h2>등록된 프로젝트</h2>
          </div>
        </div>
        <div class="project-history" id="projectHistory"></div>
      </section>
    </main>

    <script type="module" src="./js/companyPage.js?v=33"></script>
  </body>
</html>
